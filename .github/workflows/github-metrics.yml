name: Update GitHub metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Refresh metrics snapshot
        run: node scripts/updateGithubMetrics.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_STORE: file
          METRICS_UPDATE_MIN_INTERVAL_MS: 21600000
      - name: Commit updated metrics
        run: |
          # The updateGithubMetrics.js script automatically uses database storage 
          # if any PostgreSQL connection environment variables are configured
          # (DATABASE_URL, DATABASE_URL_UNPOOLED, POSTGRES_URL, etc.).
          # If database is used, the file won't be modified, so git diff will
          # detect no changes and this step will skip the commit.
          
          METRICS_FILE="data/githubMetricsHistory.json"
          if [ ! -f "$METRICS_FILE" ]; then
            echo "Metrics file not found, nothing to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$METRICS_FILE"
          
          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
            exit 0
          fi
          
          git commit -m "chore(metrics): update GitHub metrics"
          if ! git push; then
            echo "::warning title=Metrics commit not pushed::Repository rules blocked direct metrics updates; refresh completed successfully."
            exit 0
          fi
